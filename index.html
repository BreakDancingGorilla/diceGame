<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Fight Game</title>
    <link href="./style.css" rel="stylesheet" />
  </head>

  <body>
    <div id="cardHolder">
      <div class="row">
        <h1>
          Enemies Slain
          <h1 id="slainCount">Loading</h1>
        </h1>
      </div>
      <div class="row">
        <h1>
          Gold
          <h1 id="goldCount">Loading</h1>
        </h1>
      </div>
      <div id="playerDiceCard">
        <div id="playerDiceHolder">
          <div class="die" id="playerDie1">
            <h1>4d</h1>
            <div class="horzon">
              <h2>DieQuanity:</h2>
              <h2 id="4DieQuan"></h2>
            </div>
            <div class="horzon">
              <button class="list-item-button-up select-button" id="4SelectUp">
                <img
                  src="./pitfallSvgsPort/arrow-up-circle.svg"
                  class="list-item-button-img-up"
                />
              </button>
              <button
                class="list-item-button-down select-button"
                id="4SelectDown"
              >
                <img
                  src="./pitfallSvgsPort/arrow-down-circle.svg"
                  class="list-item-button-img-down"
                />
              </button>
              <h2 id="selectedDieQuan4"></h2>
            </div>
          </div>
          <div class="die" id="playerDie2">
            <h1>6d</h1>
            <div class="horzon">
              <h2>DieQuanity:</h2>
              <h2 id="6DieQuan"></h2>
            </div>
            <div class="horzon">
              <button class="list-item-button-up select-button" id="6SelectUp">
                <img
                  src="./pitfallSvgsPort/arrow-up-circle.svg"
                  class="list-item-button-img-up"
                />
              </button>
              <button
                class="list-item-button-down select-button"
                id="6SelectDown"
              >
                <img
                  src="./pitfallSvgsPort/arrow-down-circle.svg"
                  class="list-item-button-img-down"
                />
              </button>
              <h2 id="selectedDieQuan6"></h2>
            </div>
          </div>
          <div class="die" id="playerDie3">
            <h1>8d</h1>
            <div class="horzon">
              <h2>DieQuanity:</h2>
              <h2 id="8DieQuan"></h2>
            </div>
            <div class="horzon">
              <button class="list-item-button-up select-button" id="8SelectUp">
                <img
                  src="./pitfallSvgsPort/arrow-up-circle.svg"
                  class="list-item-button-img-up"
                />
              </button>
              <button
                class="list-item-button-down select-button"
                id="8SelectDown"
              >
                <img
                  src="./pitfallSvgsPort/arrow-down-circle.svg"
                  class="list-item-button-img-down"
                />
              </button>
              <h2 id="selectedDieQuan8"></h2>
            </div>
          </div>
          <div class="die" id="playerDie4">
            <h1>10d</h1>
            <div class="horzon">
              <h2>DieQuanity:</h2>
              <h2 id="10DieQuan"></h2>
            </div>
            <div class="horzon">
              <button class="list-item-button-up select-button" id="10SelectUp">
                <img
                  src="./pitfallSvgsPort/arrow-up-circle.svg"
                  class="list-item-button-img-up"
                />
              </button>
              <button
                class="list-item-button-down select-button"
                id="10SelectDown"
              >
                <img
                  src="./pitfallSvgsPort/arrow-down-circle.svg"
                  class="list-item-button-img-down"
                />
              </button>
              <h2 id="selectedDieQuan10"></h2>
            </div>
          </div>
          <div class="die" id="playerDie5">
            <h1>12d</h1>
            <div class="horzon">
              <h2>DieQuanity:</h2>
              <h2 id="12DieQuan"></h2>
            </div>
            <div class="horzon">
              <button class="list-item-button-up select-button" id="12SelectUp">
                <img
                  src="./pitfallSvgsPort/arrow-up-circle.svg"
                  class="list-item-button-img-up"
                />
              </button>
              <button
                class="list-item-button-down select-button"
                id="12SelectDown"
              >
                <img
                  src="./pitfallSvgsPort/arrow-down-circle.svg"
                  class="list-item-button-img-down"
                />
              </button>
              <h2 id="selectedDieQuan12"></h2>
            </div>
          </div>
          <div class="die" id="playerDie6">
            <h1>20d</h1>
            <div class="horzon">
              <h2>DieQuanity:</h2>
              <h2 id="20DieQuan"></h2>
            </div>
            <div class="horzon">
              <button class="list-item-button-up select-button" id="20SelectUp">
                <img
                  src="./pitfallSvgsPort/arrow-up-circle.svg"
                  class="list-item-button-img-up"
                />
              </button>
              <button
                class="list-item-button-down select-button"
                id="20SelectDown"
              >
                <img
                  src="./pitfallSvgsPort/arrow-down-circle.svg"
                  class="list-item-button-img-down"
                />
              </button>
              <h2 id="selectedDieQuan20"></h2>
            </div>
          </div>
        </div>
      </div>
      <div class="statCard">
        <h1>Player</h1>
        <h2><u>Health</u></h2>
        <h2 id="playerHealth">Loading</h2>
        <h2><u>Base Damage</u></h2>
        <h2 id="playerDamage">Loading</h2>
      </div>
      <div class="statCard">
        <div id="enemyDice" class="absolute-badge">
          <div id="enemyDiceContainer">
            <h2 class="center">Enemy Dice</h2>
            <img class="diePlaceHolderImg" src="./diePlaceHolder.webp" />
          </div>
        </div>
        <h1>Enemy</h1>
        <h2><u>Health</u></h2>
        <h2 id="enemyHealth">Loading</h2>
        <h2><u>Base Damage</u></h2>
        <h2 id="enemyDamage">Loading</h2>
      </div>
      <div id="actionButtonsFlex">
        <button class="actionButton" id="healbutton">Heal Roll</button>
        <button class="actionButton" id="attackButton">Attack Roll</button>
        <button class="actionButton" id="diceButton">Shop</button>
      </div>
      <div id="gambleBox"></div>
    </div>

    <div id="diceGrid">
      <div id="player-dice-box">
        <div class="numRolledBox">
          <h1 id="numRolledTextPlayer">20</h1>
        </div>
      </div>
      <div id="enemy-dice-box">
        <div class="numRolledBox">
          <h1 id="numRolledTextEnemy">20</h1>
        </div>
      </div>
    </div>

    <script type="module" src="./code.js"></script>
  </body>
</html>
